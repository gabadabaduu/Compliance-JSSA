services:
  - type: web
    name: compliance-backend
    runtime: docker
    plan: free
    region: oregon
    branch: develop
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true

  - type: web
    name: compliance-frontend
    runtime: docker
    plan: free
    region: oregon
    branch: develop
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: frontend
    autoDeploy: true

databases: []