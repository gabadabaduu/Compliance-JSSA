services:
  # Backend (.NET 8) - build from your Dockerfile
  - type: web
    name: compliance-backend
    runtime: docker
    plan: free
    region: oregon
    branch: develop
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:$PORT

      # Supabase Postgres connection (testing)
      - key: SUPABASE_DB_CONNECTION
        value: "Host=aws-1-us-east-1.pooler.supabase.com;Port=6543;Username=postgres.zyzmaaeoutsfstapbgmc;Password=compliacespace12;Database=postgres;SslMode=Require;TrustServerCertificate=true;KeepAlive=30"
      - key: ConnectionStrings__DefaultConnection
        value: ${SUPABASE_DB_CONNECTION};

      # Supabase API keys (testing)
      - key: SUPABASE_URL
        value: "https://zyzmaaeoutsfstapbgmc.supabase.co"
      - key: SUPABASE_ANON_KEY
        value: "sb_publishable_LMCPeGJlx-MyhjKVHq1New_9"

      # JWT settings (testing)
      - key: Jwt__Secret
        value: "xVTha/RnXLSlcvHWhmHzi+HfKSdjOtHOSCsjn9xk0dvtyLHQbYmsyCTX9ICUeHzFJHZtj5xNrKQusTeb2QA6ZA=="
      - key: Jwt__Issuer
        value: "CompliancePlatform"
      - key: Jwt__Audience
        value: "CompliancePlatformUsers"
      - key: Jwt__ExpiryMinutes
        value: 60
      - key: Jwt__RefreshTokenExpiryDays
        value: 7

      - key: AllowedOrigins
        value: "https://compliance-frontend.onrender.com,http://localhost:5173"

  # Frontend (Vite/React) - force outDir to `dist` and publish that folder
  - type: static
    name: compliance-frontend
    plan: free
    region: oregon
    branch: develop
    # pass the --outDir argument to vite build so output is always frontend/dist
    buildCommand: cd frontend && npm ci && npm run build -- --outDir dist
    publishPath: frontend/dist
    autoDeploy: true
    envVars:
      - key: VITE_SUPABASE_URL
        value: "https://zyzmaaeoutsfstapbgmc.supabase.co"
      - key: VITE_SUPABASE_ANON_KEY
        value: "sb_publishable_LMCPeGJlx-MyhjKVHq1New_9"

databases: []