version: '3.8'

services:
 

  # ============================================
  # 🔴 Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: compliance-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - compliance-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ============================================
  # 🌐 Backend .NET 8
  # ============================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: compliance-backend
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=compliance_db;Username=postgres;Password=postgres123
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Secret=TU_SECRET_JWT_MINIMO_32_CARACTERES_CAMBIAR_EN_PRODUCCION_12345678
      - Jwt__Issuer=CompliancePlatform
      - Jwt__Audience=CompliancePlatformUsers
      - Jwt__ExpiryMinutes=60
      - Jwt__RefreshTokenExpiryDays=7
      - AllowedOrigins=http://localhost:3000,http://localhost:5173
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - compliance-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # 🎨 Frontend React + Vite
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: compliance-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - compliance-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  compliance-network:
    driver: bridge