version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: compliance-db
    environment:
      POSTGRES_DB: compliance_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - compliance-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: compliance-redis
    ports:
      - "6379:6379"
    networks:
      - compliance-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: compliance-app
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=compliance_db;Username=postgres;Password=postgres123"
      ConnectionStrings__Redis: "redis:6379"
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - compliance-network

volumes:
  postgres_data:

networks:
  compliance-network:
    driver: bridge
