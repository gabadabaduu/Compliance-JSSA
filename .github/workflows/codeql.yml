# CodeQL SAST workflow - analiza C# y JS/TS en pushes y PRs
# Resultados visibles en GitHub: Security > Code scanning alerts
name: "CodeQL Analysis"

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]
  schedule:                       # análisis nocturno programado
    - cron: '0 3 * * *'

permissions:
  actions: read
  contents: read
  security-events: write         # permitir subir resultados SARIF a code scanning

jobs:
  analyze:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          # Lenguajes a analizar: agrega/saca según tu stack
          languages: csharp, javascript, typescript

      - name: Perform autobuild
        uses: github/codeql-action/autobuild@v2

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v2
        # Opcional: puedes pasar query packs o config adicional aquí