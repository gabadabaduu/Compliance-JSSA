# Semgrep - reglas rápidas y personalizadas
# Produce anotaciones en la pestańa Checks (Actions). Puedes usar reglas públicas (p/ci) o tu propio ruleset.
name: Semgrep Scan

on:
  pull_request:
    branches: [ "develop", "main" ]
  push:
    branches: [ "develop", "main" ]
  schedule:
    - cron: '0 4 * * *'

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        # Usa la acción oficial; 'config' puede ser 'p/ci' o un path a tu reglas en el repo
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/ci"  # cambiar a "./.semgrep/" si guardas reglas personalizadas en el repo
          output-format: sarif